<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
html,body{height:100%;background:#fff;color:#111;font-family:'Space Mono',monospace}
body{
  display:flex;flex-direction:column;align-items:center;justify-content:center;

}
.logo{
  width:88px;height:88px;margin-bottom:3rem;

.code{
  font-size:0.6rem;font-weight:700;letter-spacing:0.32em;

}
.headline{
  font-size:clamp(1.4rem, 4vw, 2.4rem);
  font-weight:700;letter-spacing:-0.02em;line-height:1.1;
  margin-bottom:1.5rem;
}
.headline em{font-style:italic;font-weight:400;color:#888}
.sub{
  font-size:0.75rem;font-weight:400;letter-spacing:0.04em;
  color:#888;max-width:32ch;margin-bottom:3rem;line-height:1.6;
}
.links{display:flex;gap:1.5rem;flex-wrap:wrap;justify-content:center}
.links a{
  font-size:0.6rem;font-weight:700;letter-spacing:0.2em;
  text-transform:uppercase;color:#111;text-decoration:none;
  border-bottom:1px solid #111;padding-bottom:3px;
  transition:opacity 0.2s, border-color 0.2s;
}
.links a:hover{opacity:0.55}
.links a:focus-visible{outline:2px solid #111;outline-offset:4px}
